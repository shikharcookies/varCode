namespace: teamcity_inventory_dbd
endpoints:

  - path: /teamcity/active-builds-by-type
    method: get
    function: get_teamcity_active_builds_by_type
    description: "Get active TeamCity builds count grouped by Build Type (CI/CD)"
    parameters:
      - name: build_type
        type: string
        description: "Filter by build type (CI or CD)"
        required: false
    response_format: json 